<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Ventas</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background: #f4f6f9;
            padding: 30px;
            color: #333;
        }

        .container{
            max-width: 1100px;
            margin: auto;
        }

        .header{
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.15);
        }

        .header h1{
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p{
            opacity: 0.9;
        }

        .cards{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card{
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-5px);
        }

        .card h3{
            color: #666;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card p{
            font-size: 30px;
            font-weight: bold;
            color: #2563eb;
        }

        .content{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .box{
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.08);
        }

        .box h2{
            margin-bottom: 20px;
            color: #1e3a8a;
        }

        ul{
            list-style: none;
        }

        ul li{
            padding: 12px;
            margin-bottom: 10px;
            background: #f1f5f9;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: 500;
        }

        canvas{
            width: 100% !important;
            height: 350px !important;
        }

        @media(max-width: 900px){
            .content{
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Encabezado -->
    <div class="header">
        <h1>📊 Reporte de Ventas</h1>
        <p>Resumen general de ventas e ingresos</p>
    </div>

    <!-- Tarjetas -->
    <div class="cards">

        <div class="card">
            <h3>Total de Ventas</h3>
            <p>{{ t_ventas }}</p>
        </div>

        <div class="card">
            <h3>Total de Ingresos</h3>
            <p>Bs. {{ t_ingresos }}</p>
        </div>

    </div>

    <!-- Contenido -->
    <div class="content">

        <!-- Lista -->
        <div class="box">
            <h2>📦 Ventas por Producto</h2>

            <ul>
                {% for item in venta_por_producto %}
                    <li>
                        <span>{{ item[0] }}</span>
                        <span>{{ item[1] }}</span>
                    </li>
                {% endfor %}
            </ul>
        </div>

        <!-- Gráfico -->
        <div class="box">
            <h2>📈 Gráfico de Ventas</h2>
            <canvas id="grafica"></canvas>
        </div>

    </div>

</div>

<script>
window.onload = function() {

    const ctx = document.getElementById('grafica');

    const labels = {{ venta_por_producto | map(attribute=0) | list | tojson }};
    const data = {{ venta_por_producto | map(attribute=1) | list | tojson }};

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Ventas por producto',
                data: data,
                backgroundColor: [
                    '#2563eb',
                    '#16a34a',
                    '#f59e0b',
                    '#dc2626',
                    '#7c3aed',
                    '#0891b2'
                ],
                borderRadius: 8,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    labels: {
                        font: {
                            size: 14
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}
</script>

</body>
</html>
